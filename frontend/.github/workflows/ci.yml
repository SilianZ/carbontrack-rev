
# Frontend CI for target repo - runs install, lint, build and unit tests
name: Frontend CI

env:
  NODE_VERSION: '20.9.0'
  PNPM_VERSION: '10.4.1'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  install-deps:
    name: frontend:install-deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable pnpm via corepack
        run: |
          corepack enable || true
          corepack prepare pnpm@${PNPM_VERSION} --activate || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    name: frontend:lint
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable pnpm
        run: |
          corepack enable || true
          corepack prepare pnpm@${PNPM_VERSION} --activate || true

      - name: Run lint
        run: pnpm lint --reporter=github || true

  build:
    name: frontend:build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable pnpm
        run: |
          corepack enable || true
          corepack prepare pnpm@${PNPM_VERSION} --activate || true

      - name: Install deps (build job)
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

  unit-tests:
    name: frontend:unit-tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable pnpm
        run: |
          corepack enable || true
          corepack prepare pnpm@${PNPM_VERSION} --activate || true

      - name: Install deps (test job)
        run: pnpm install --frozen-lockfile

      - name: Detect test script
        id: has-tests
        shell: bash
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.test ? 0 : 1)"; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run unit tests
        if: steps.has-tests.outputs.present == 'true'
        run: pnpm test -- --ci

      - name: Skip unit tests
        if: steps.has-tests.outputs.present != 'true'
        run: |
          echo "::warning::No test script defined in frontend/package.json; unit tests were skipped."
          {
            echo "## Unit test status"
            echo "- ⚠️ No \`test\` script found in \`package.json\`; tests were skipped in this run."
          } >> "$GITHUB_STEP_SUMMARY"

