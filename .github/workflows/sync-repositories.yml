name: Sync Monorepo Mirrors

env:
  FRONTEND_NODE_VERSION: '20.9.0'

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: sync-mirrors-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend_changed }}
      backend_changed: ${{ steps.filter.outputs.backend_changed }}
      target_branch: ${{ steps.branch.outputs.target_branch }}
      short_sha: ${{ steps.branch.outputs.short_sha }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve branch metadata
        id: branch
        run: |
          echo "target_branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Detect changed areas
        id: filter
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [ "$BEFORE" = "$ZERO_SHA" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              DIFF_RANGE="HEAD~1..HEAD"
              CHANGED_FILES="$(git diff --name-only $DIFF_RANGE)"
            else
              DIFF_RANGE="HEAD"
              CHANGED_FILES="$(git show --pretty='' --name-only HEAD)"
            fi
          else
            DIFF_RANGE="$BEFORE..$AFTER"
            CHANGED_FILES="$(git diff --name-only $DIFF_RANGE)"
          fi

          echo "Using diff range: $DIFF_RANGE"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q '^frontend/'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -q '^backend/'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

  sync-frontend:
    name: sync-frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ needs.detect-changes.outputs.target_branch }}
      SHORT_SHA: ${{ needs.detect-changes.outputs.short_sha }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Create frontend GitHub App token
        id: frontend-app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.MIRROR_SYNC_APP_ID }}
          private-key: ${{ secrets.MIRROR_SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            frontend
          permission-contents: write

      - name: Resolve frontend app bot identity
        id: frontend-bot
        env:
          GH_TOKEN: ${{ steps.frontend-app-token.outputs.token }}
        run: |
          echo "user_id=$(gh api "/users/${{ steps.frontend-app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Setup Git
        run: |
          git config --global user.name "${{ steps.frontend-app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.frontend-bot.outputs.user_id }}+${{ steps.frontend-app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FRONTEND_NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Validate frontend in monorepo
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm build

      - name: Mirror frontend subtree to target repository
        run: |
          rm -rf frontend-repo
          git clone "https://x-access-token:${{ steps.frontend-app-token.outputs.token }}@github.com/carbon-track/frontend.git" frontend-repo
          cd frontend-repo

          if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${TARGET_BRANCH}" --depth=1
            git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          elif git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git fetch origin main --depth=1
            git checkout -B "${TARGET_BRANCH}" origin/main
          else
            git checkout --orphan "${TARGET_BRANCH}"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -a ../frontend/. .

          if git diff --quiet --exit-code && git diff --cached --quiet --exit-code; then
            echo "Frontend mirror already up to date on ${TARGET_BRANCH}"
            exit 0
          fi

          git add -A
          git commit -m "chore(sync): 映单仓前端之变于镜仓 (${SHORT_SHA})"
          git push origin "HEAD:${TARGET_BRANCH}"

  sync-backend:
    name: sync-backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ needs.detect-changes.outputs.target_branch }}
      SHORT_SHA: ${{ needs.detect-changes.outputs.short_sha }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Create backend GitHub App token
        id: backend-app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.MIRROR_SYNC_APP_ID }}
          private-key: ${{ secrets.MIRROR_SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            backend
          permission-contents: write

      - name: Resolve backend app bot identity
        id: backend-bot
        env:
          GH_TOKEN: ${{ steps.backend-app-token.outputs.token }}
        run: |
          echo "user_id=$(gh api "/users/${{ steps.backend-app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Setup Git
        run: |
          git config --global user.name "${{ steps.backend-app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.backend-bot.outputs.user_id }}+${{ steps.backend-app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Validate backend in monorepo
        working-directory: backend
        run: |
          composer install --no-interaction --prefer-dist
          composer test

      - name: Mirror backend subtree to target repository
        run: |
          rm -rf backend-repo
          git clone "https://x-access-token:${{ steps.backend-app-token.outputs.token }}@github.com/carbon-track/backend.git" backend-repo
          cd backend-repo

          if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${TARGET_BRANCH}" --depth=1
            git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          elif git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git fetch origin main --depth=1
            git checkout -B "${TARGET_BRANCH}" origin/main
          else
            git checkout --orphan "${TARGET_BRANCH}"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -a ../backend/. .

          if git diff --quiet --exit-code && git diff --cached --quiet --exit-code; then
            echo "Backend mirror already up to date on ${TARGET_BRANCH}"
            exit 0
          fi

          git add -A
          git commit -m "chore(sync): 映单仓后端之变于镜仓 (${SHORT_SHA})"
          git push origin "HEAD:${TARGET_BRANCH}"
